version: '3.9'

services:

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent-net

  app:
    build: .
    container_name: coding-assistant
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./rag:/app/rag
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    depends_on:
      - qdrant
    networks:
      - agent-net

volumes:
  qdrant_data:
    driver: local

networks:
  agent-net:
    driver: bridge